<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Lab 2 - Task 1</title>
</head>
<body>
  <script>
    window.addEventListener("load", () => {
      let count = localStorage.getItem("pageLoadCount");

      if (count === null) {
        count = 0;
      } else {
        count = Number(count);
      }

      count++;
      localStorage.setItem("pageLoadCount", count);

      alert(`Вы загрузили/обновили эту страницу ${count} раз(а).`);
    });
  </script>
</body>
</html>
