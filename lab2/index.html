<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 2 part 1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    #result img,
    #result .error,
    #result .message {
      width: 200px;
      min-height: 60px;
      border: 1px solid #000;
      padding: 10px;
      box-sizing: border-box;
      background: #f8f8f8;
    }

    #result img {
      width: 200px;
      height: auto;
      padding: 0;
      background: transparent;
      border: 1px solid #000;
    }

    #result .message {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="buttons">
    <button id="t1">Задание 1 - Счетчик загрузок страницы</button>
    <button id="t2">Задание 2 - Загрузка 5 изображений по порядку</button>
    <button id="t3">Задание 3 - Загрузка 5 изображений без порядка</button>
    <button id="t4">Задание 4 - async/await для изображений</button>
    <button id="t5">Задание 5 - Проверка 5 IP</button>
  </div>

  <div id="result"></div>

  <script src="script.js"></script>
</body>
</html>
